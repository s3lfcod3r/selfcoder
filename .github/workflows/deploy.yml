name: Deploy to GitHub Pages

# Bei jedem Push auf main: in der Cloud bauen und auf GitHub Pages veroeffentlichen.
# Kein lokaler Build noetig.

on:
  push:
    branches: [main]
  workflow_dispatch: # erlaubt manuelles Ausloesen ueber den Actions-Tab

# Rechte, die der GITHUB_TOKEN fuer das Pages-Deployment braucht.
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig; laufende werden nicht abgebrochen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
